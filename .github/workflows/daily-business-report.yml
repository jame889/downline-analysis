name: Daily Business Report Sync

on:
  schedule:
    # 06:30 Asia/Bangkok (23:30 UTC on the previous day)
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      month:
        description: Optional report month (YYYY-MM)
        required: false
        type: string
      dry_run:
        description: Download and validate without syncing Production
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: daily-business-report
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install report dependencies
        run: python -m pip install openpyxl requests

      - name: Download, validate, and sync report
        env:
          FIRST_THAILAND_USER: ${{ secrets.FIRST_THAILAND_USER }}
          FIRST_THAILAND_PASSWORD: ${{ secrets.FIRST_THAILAND_PASSWORD }}
          BUSINESS_REPORT_SYNC_SECRET: ${{ secrets.BUSINESS_REPORT_SYNC_SECRET }}
          BUSINESS_REPORT_SYNC_URL: https://downline-analyzer.vercel.app/api/admin/business-report-sync
          INPUT_MONTH: ${{ inputs.month }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          args=(--include-previous --output-dir downloaded_reports)
          if [ -n "$INPUT_MONTH" ]; then args+=(--month "$INPUT_MONTH"); fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then args+=(--dry-run); fi
          python scripts/sync_business_report.py "${args[@]}"

      - name: Archive source report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: business-report-${{ github.run_id }}
          path: downloaded_reports/*.xlsx
          if-no-files-found: ignore
          retention-days: 30
