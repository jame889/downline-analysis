name: Deploy Vercel Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify application build
        run: npm run build

      - name: Pull Production configuration
        run: npx vercel@56.3.1 pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Production configuration
        run: npx vercel@56.3.1 build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to Production
        run: npx vercel@56.3.1 deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
